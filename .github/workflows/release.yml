name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.9"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Read version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Import code signing certificate
        if: env.APPLE_CERTIFICATE_BASE64 != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | head -1 | awk -F '"' '{print $2}')
          echo "CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Build app bundle (ARM64)
        run: |
          swift package clean
          make app-arm64

      - name: Build app bundle (x86_64)
        run: |
          swift package clean
          make app-x86_64

      - name: Build app bundle (universal)
        run: |
          swift package clean
          make app-universal

      - name: Code sign app bundles
        if: env.CODESIGN_IDENTITY != ''
        run: |
          for bundle in spacemap-arm64.app spacemap-x86_64.app spacemap.app; do
            if [ -d "$bundle" ]; then
              codesign --force --sign "$CODESIGN_IDENTITY" \
                --options runtime \
                --timestamp \
                "$bundle"
              echo "Signed $bundle"
            fi
          done

      - name: Create DMGs
        run: |
          make _dmg INPUT=spacemap-arm64.app OUTPUT=spacemap-${{ steps.version.outputs.tag }}-arm64.dmg
          make _dmg INPUT=spacemap-x86_64.app OUTPUT=spacemap-${{ steps.version.outputs.tag }}-x86_64.dmg
          make _dmg INPUT=spacemap.app OUTPUT=spacemap-${{ steps.version.outputs.tag }}-universal.dmg

      - name: Code sign DMGs
        if: env.CODESIGN_IDENTITY != ''
        run: |
          for dmg in spacemap-*-arm64.dmg spacemap-*-x86_64.dmg spacemap-*-universal.dmg; do
            if [ -f "$dmg" ]; then
              codesign --force --sign "$CODESIGN_IDENTITY" \
                --timestamp \
                "$dmg"
              echo "Signed $dmg"
            fi
          done

      - name: Notarize DMGs
        if: env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for dmg in spacemap-*-arm64.dmg spacemap-*-x86_64.dmg spacemap-*-universal.dmg; do
            if [ -f "$dmg" ]; then
              echo "Notarizing $dmg..."
              xcrun notarytool submit "$dmg" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_APP_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" \
                --wait
              xcrun stapler staple "$dmg"
              echo "Notarized $dmg"
            fi
          done

      - name: Generate checksums
        run: |
          shasum -a 256 spacemap-*-arm64.dmg spacemap-*-x86_64.dmg spacemap-*-universal.dmg > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: spacemap ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            spacemap-*-arm64.dmg
            spacemap-*-x86_64.dmg
            spacemap-*-universal.dmg
            checksums.txt

      - name: Update Homebrew tap
        if: env.HOMEBREW_TAP_TOKEN != ''
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          ARM64_SHA=$(shasum -a 256 spacemap-*-arm64.dmg | awk '{print $1}')
          X86_SHA=$(shasum -a 256 spacemap-*-x86_64.dmg | awk '{print $1}')

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/wiggly-sheets/homebrew-spacemap.git" tap-repo
          cd tap-repo

          cat > Casks/spacemap.rb << 'CASK_EOF'
          cask "spacemap" do
            arch = on_arch_conditional arm: "arm64", intel: "x86_64"

            version "VERSION_PLACEHOLDER"
            sha256 arm:   "ARM64_PLACEHOLDER",
                   intel: "X86_PLACEHOLDER"

            url "https://github.com/wiggly-sheets/spacemap/releases/download/v#{version}/spacemap-#{version}-#{arch}.dmg"
            name "spacemap"
            desc "Yabai workspace visualizer"
            homepage "https://github.com/wiggly-sheets/spacemap"

            depends_on macos: :ventura

            app "spacemap.app"

            zap trash: [
              "~/Library/Preferences/com.spacemap.plist",
              "~/.config/spacemap",
            ]
          end
          CASK_EOF

          sed -i '' "s/VERSION_PLACEHOLDER/${VERSION}/" Casks/spacemap.rb
          sed -i '' "s/ARM64_PLACEHOLDER/${ARM64_SHA}/" Casks/spacemap.rb
          sed -i '' "s/X86_PLACEHOLDER/${X86_SHA}/" Casks/spacemap.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/spacemap.rb
          git commit -m "spacemap ${VERSION}" || echo "No changes"
          git push

      - name: Cleanup keychain
        if: always() && env.KEYCHAIN_PATH != ''
        run: security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
