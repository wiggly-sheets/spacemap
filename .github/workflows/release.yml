name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.9"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Read version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build universal binary
        run: make build-universal

      - name: Build app bundle (ARM64)
        run: |
          swift package clean
          make app-arm64

      - name: Build app bundle (x86_64)
        run: |
          swift package clean
          make app-x86_64

      - name: Build app bundle (universal)
        run: |
          swift package clean
          make app-universal

      - name: Create DMGs
        run: |
          make dmg-arm64
          make dmg-x86_64
          make dmg-universal

      - name: Generate checksums
        run: |
          shasum -a 256 spacemap-*-arm64.dmg spacemap-*-x86_64.dmg spacemap-*-universal.dmg > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: spacemap ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            spacemap-*-arm64.dmg
            spacemap-*-x86_64.dmg
            spacemap-*-universal.dmg
            checksums.txt
